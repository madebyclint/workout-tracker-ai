<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Workout Tracker</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
  <link rel="shortcut icon" href="/favicon_io/favicon.ico" />
  <link rel="stylesheet" href="style.css" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#111827" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workouts" />
  <link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
</head>
<body>

<header>
  <div class="header-top">
    <h1 style="cursor:pointer" onclick="window.location.href='/'">Workout Tracker</h1>
    <span class="cycle-badge" id="headerCycleBadge">Week —</span>
  </div>
  <div class="header-meta" id="headerMeta">Loading…</div>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="program">Program</button>
    <button class="tab-btn" data-tab="session">Session</button>
    <button class="tab-btn" data-tab="log">Log</button>
    <button class="tab-btn" data-tab="reference">Reference</button>
    <button class="tab-btn" data-tab="archive">Archive</button>
    <button class="tab-btn" data-tab="generate">Generate</button>
  </nav>
</header>

<main>
  <!-- PROGRAM TAB -->
  <section id="tab-program" class="page active">
    <div id="programContent" class="loading">Loading program…</div>
  </section>

  <!-- SESSION TAB -->
  <section id="tab-session" class="page">
    <div id="sessionContent">
      <div class="loading">Loading session…</div>
    </div>
  </section>

  <!-- LOG TAB -->
  <section id="tab-log" class="page">
    <div id="logContent">
      <div class="loading">Loading log…</div>
    </div>
  </section>

  <!-- REFERENCE TAB -->
  <section id="tab-reference" class="page">
    <div id="referenceContent" class="loading">Loading exercise library…</div>
  </section>

  <!-- ARCHIVE TAB -->
  <section id="tab-archive" class="page">
    <div id="archiveContent" class="loading">Loading archive…</div>
  </section>

  <!-- GENERATE TAB -->
  <section id="tab-generate" class="page">
    <div id="generateContent"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/state.js"></script>
<script src="js/markdown.js"></script>
<script src="js/program.js"></script>
<script src="js/session.js"></script>
<script src="js/log.js"></script>
<script src="js/generate.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
